<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TLLTD: HSL to Clicks </title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1>
        HSL TO Clicks
    </h1>
    
    <div class="inputBox">
        <label for="hue">Hue</label>
        <input type="text" id="hue" placeholder="value" class="baseInput">
        <label for="hueResult" class="result">-></label>
        <input type="text" id="hueResult" placeholder="Clicks" disabled>


        <label for="saturation">Saturation</label>
        <input type="text" id="saturation" placeholder="value" class="baseInput">
        <label for="saturationResult" class="result">-></label>
        <input type="text" id="saturationResult" placeholder="Clicks" disabled>


        <label for="lightness">Lightness</label>
        <input type="text" id="lightness" placeholder="value" class="baseInput">
        <label for="lightnessResult" class="result">-></label>
        <input type="text" id="lightnessResult" placeholder="Clicks" disabled>


        <button onclick="calculateValues()">
            Okay
        </button>
    </div>
    <img src="/images/boxBG.png" alt="">
    <div id="moon"></div>


</body>
<script>
    function calculateValues() {
        const hue = document.getElementById("hue")
        const hueResult = document.getElementById("hueResult")
        const saturation = document.getElementById("saturation")
        const saturationResult = document.getElementById("saturationResult")
        const lightness = document.getElementById("lightness")
        const lightnessResult = document.getElementById("lightnessResult")
        const moonColour = document.getElementById("moon")
        const btn = document.querySelector("button")

        btn.classList.add("play-animation");
        setTimeout(() => {
            btn.classList.remove("play-animation");
        }, 600);

        // Change Moon Color
        moonColour.style.backgroundColor = `hsl(${hue.value}, ${saturation.value}%, ${lightness.value}%)`;

        // Do calculations
        hueResult.value = Math.round((hue.value/360)*202)
        saturationResult.value = Math.round((saturation.value/100)*213)
        lightnessResult.value = Math.round((lightness.value/100)*111)

        console.log("yus slay")
    }
</script>
</html>
